services:
  db:
    image: postgres:15-alpine
    container_name: blog-api-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-blogs}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: blog-api-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-api-service
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=db;Database=${DB_NAME:-blogs};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-password}
      - ConnectionStrings__Redis=redis:6379
      - JWT__Secret=${JWT_SECRET}
      - SEED_DATA=${SEED_DATA:-true}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./Logs:/app/Logs
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - bin/
            - obj/
            - uploads/
            - Logs/
            - test_uploads/
            - .git/
            - .vs/

volumes:
  postgres_data:
