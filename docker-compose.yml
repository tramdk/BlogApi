services:
  db:
    image: postgres:15-alpine
    container_name: flora-core-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-blogs}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: flora-core-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flora-core-service
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=db;Database=${DB_NAME:-blogs};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-password}
      - ConnectionStrings__Redis=redis:6379
      - JWT__Secret=${JWT_SECRET}
      - SEED_DATA=${SEED_DATA:-true}
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
      - MailSettings__Server=${MAIL_SERVER}
      - MailSettings__Port=${MAIL_PORT}
      - MailSettings__SenderName=${MAIL_SENDER_NAME}
      - MailSettings__SenderEmail=${MAIL_SENDER_EMAIL}
      - MailSettings__Username=${MAIL_USERNAME}
      - MailSettings__Password=${MAIL_PASSWORD}
      - Telemetry__OtlpEndpoint=http://otel-collector:4317
      - Telemetry__ExportToConsole=false
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - db
      - redis
      - otel-collector
    volumes:
      - ./uploads:/app/uploads
      - ./Logs:/app/Logs
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - bin/
            - obj/
            - uploads/
            - Logs/
            - test_uploads/
            - .git/
            - .vs/

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: flora-core-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./telemetry/otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus scrape endpoint
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: flora-core-jaeger
    ports:
      - "16686:16686" # Web UI

  prometheus:
    image: prom/prometheus:latest
    container_name: flora-core-prometheus
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: flora-core-grafana
    volumes:
      - ./telemetry/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
      - jaeger

volumes:
  postgres_data:
