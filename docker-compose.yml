services:
  db:
    image: postgres:15-alpine
    container_name: blog-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blogs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: blog-api-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-api-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=db;Database=blogs;Username=postgres;Password=password
      - ConnectionStrings__Redis=redis:6379
      - JWT__Secret=YourSuperSecretKeyWithAtLeast32Characters!
      - SEED_DATA=true
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./Logs:/app/Logs
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - bin/
            - obj/
            - uploads/
            - Logs/
            - test_uploads/
            - .git/
            - .vs/

volumes:
  postgres_data:
